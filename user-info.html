<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Niketan — Complete Your Profile</title>
    <meta name="description" content="Complete your Tourist Niketan profile to start exploring Maharashtra.">

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Fonts & Icons (same as login page) -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ─── Reset & Base ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0ea5e9;
            background: linear-gradient(135deg, #0ba5e9 0%, #0284c7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* ─── Decorative Circles ─── */
        .background-decorations .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 1);
        }

        .circle.top-left {
            width: 250px;
            height: 250px;
            top: -50px;
            left: -50px;
            z-index: 1;
        }

        .circle.bottom-right {
            width: 350px;
            height: 350px;
            bottom: -150px;
            right: 5%;
            z-index: 1;
        }

        /* ─── Card Layout ─── */
        .main-container {
            width: 100%;
            max-width: 1100px;
            height: 560px;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            height: 100%;
            display: flex;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        /* ─── Left Panel (Image) ─── */
        .left-panel {
            width: 50%;
            background-image: url('assets/background.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0) 40%, rgba(0, 0, 0, 0) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
            padding: 60px 40px;
        }

        .logo-text {
            font-family: 'Great Vibes', cursive;
            font-size: 55px;
            font-weight: 400;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .tagline {
            font-size: 13px;
            line-height: 1.6;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
            max-width: 80%;
        }

        /* ─── Right Panel (Form) ─── */
        .right-panel {
            width: 50%;
            position: relative;
            padding: 50px 50px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .form-header {
            text-align: center;
            margin-bottom: 8px;
        }

        .form-header h2 {
            color: #0284c7;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .form-header p {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.5;
        }

        /* ─── Step Indicator ─── */
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .step {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .step.done {
            background: #0284c7;
            color: #fff;
        }

        .step.active {
            background: #0ea5e9;
            color: #fff;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.25);
        }

        .step.pending {
            background: #e2e8f0;
            color: #94a3b8;
        }

        .step-line {
            width: 40px;
            height: 3px;
            border-radius: 2px;
        }

        .step-line.done {
            background: #0284c7;
        }

        .step-line.pending {
            background: #e2e8f0;
        }

        /* ─── Form ─── */
        .user-form {
            width: 100%;
            max-width: 320px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        .input-group .input-wrapper {
            position: relative;
        }

        .input-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        .input-group input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input::placeholder {
            color: #cbd5e1;
        }

        .input-group input:focus {
            border-color: #0ea5e9;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        .input-group input:focus ~ .input-icon,
        .input-group input:focus + .input-icon {
            color: #0ea5e9;
        }

        /* Email display chip */
        .email-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 22px;
        }

        .email-chip i {
            color: #0ea5e9;
            font-size: 14px;
        }

        .email-chip span {
            font-size: 13px;
            color: #0369a1;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ─── Submit Button ─── */
        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
            box-shadow: 0 4px 14px rgba(2, 132, 199, 0.35);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(2, 132, 199, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .submit-btn.loading .btn-text {
            display: none;
        }

        .submit-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ─── Loading Overlay (initial auth check) ─── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0ba5e9 0%, #0284c7 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.4s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 16px;
        }

        .loading-overlay p {
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 500;
            opacity: 0.9;
        }

        /* ─── Responsive ─── */
        @media (max-width: 900px) {
            .card {
                flex-direction: column;
                overflow-y: auto;
            }

            .left-panel,
            .right-panel {
                width: 100%;
            }

            .left-panel {
                min-height: 280px;
            }

            .main-container {
                height: 100vh;
                padding: 0;
            }

            .card {
                border-radius: 0;
            }

            .right-panel {
                padding: 40px 30px;
            }
        }

        /* ─── Fade-in animation ─── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .right-panel > * {
            animation: fadeInUp 0.5s ease forwards;
        }

        .right-panel > *:nth-child(1) { animation-delay: 0.1s; }
        .right-panel > *:nth-child(2) { animation-delay: 0.2s; }
        .right-panel > *:nth-child(3) { animation-delay: 0.3s; }
        .right-panel > *:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>

<body>
    <!-- Loading overlay while checking auth -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loader"></div>
        <p>Verifying your session…</p>
    </div>

    <!-- Decorative background -->
    <div class="background-decorations">
        <div class="circle top-left"></div>
        <div class="circle bottom-right"></div>
    </div>

    <div class="main-container">
        <div class="card">
            <!-- Left Panel — same branding as login -->
            <div class="left-panel">
                <div class="image-overlay">
                    <h1 class="logo-text">Tourist Niketan</h1>
                    <p class="tagline">Explore India, Feel Apna Culture</p>
                </div>
            </div>

            <!-- Right Panel — User Info Form -->
            <div class="right-panel">
                <!-- Step Indicator -->
                <div class="step-indicator">
                    <div class="step done"><i class="fas fa-check" style="font-size:13px"></i></div>
                    <div class="step-line done"></div>
                    <div class="step active">2</div>
                    <div class="step-line pending"></div>
                    <div class="step pending">3</div>
                </div>

                <div class="form-header">
                    <h2>Almost There!</h2>
                    <p>Tell us a little about yourself to get started.</p>
                </div>

                <!-- Email chip (populated by JS) -->
                <div class="email-chip" id="email-chip" style="visibility: hidden;">
                    <i class="fas fa-envelope"></i>
                    <span id="email-display">loading…</span>
                </div>

                <form class="user-form" id="user-info-form" novalidate>
                    <div class="input-group">
                        <label for="full-name">Full Name</label>
                        <div class="input-wrapper">
                            <input type="text" id="full-name" name="name" placeholder="e.g. Radhika Mundada" required>
                            <i class="fas fa-user input-icon"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="age">Age</label>
                        <div class="input-wrapper">
                            <input type="number" id="age" name="age" placeholder="e.g. 24" min="1" max="120" required>
                            <i class="fas fa-calendar input-icon"></i>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <span class="btn-text">Save &amp; Continue to Chat <i class="fas fa-arrow-right"></i></span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="user-info.js"></script>
</body>

</html>
